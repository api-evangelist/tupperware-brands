aid: tupperware-brands
name: Tupperware Brands
description: >-
  Tupperware Brands Corporation was an American multinational consumer goods company
  that manufactured and marketed premium kitchen storage, preparation, and serving products
  under the Tupperware brand, as well as related home product lines. The company distributed
  products to approximately 70 countries through independent sales force members. Tupperware
  Brands filed for Chapter 11 bankruptcy in September 2024 and underwent liquidation in 2025.
  The Tupperware brand name was subsequently acquired by Party Products LLC. No public developer
  API program was available during the company's operation.
